name: test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Test
        env:
          CI: "true"
          # Keep tests mostly hermetic by default.
          CLAUDE_CODE_DISABLE_ANALYTICS: "1"
          DISABLE_TELEMETRY: "1"
        run: npm test

